name: Build on Tag Push

on:
  push:
    tags:
      - 'v*' # Triggers on version tags like v1.0.0, v2.1.3, etc.
      - 'release-*' # Triggers on release tags like release-1.0.0

permissions:
  contents: write # Required to create releases
  actions: read # Required to download artifacts

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # WinUI 3 app needs the VS-bundled MSBuild (MrtCore PRI generation isn't available
      # to the standalone dotnet SDK).
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore WCtrlDcsBiosBridge.csproj

      - name: Compute version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"                     # e.g. 1.8.1-beta
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE_PART="${TAG#*-}"                  # beta (if any)
          else
            PRERELEASE_PART=""
          fi
          BASE="${TAG%%-*}"                              # 1.8.1 (strip -beta/-rc etc.)

          # Normalize base numeric version to x.y.z
          [[ "$BASE" =~ ^[0-9]+\.[0-9]+$ ]] && BASE="${BASE}.0"
          if ! [[ "$BASE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG' is not a valid SemVer (expected vX.Y[.Z][-prerelease])" >&2
            exit 1
          fi

          # Keep prerelease in VER (SemVer) but strip it for Assembly/File versions
          VER="$TAG"                                     # e.g. 1.8.1-beta
          FILEVER="$BASE"                                # e.g. 1.8.1
          [[ "$FILEVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && FILEVER="${FILEVER}.0"  # -> 1.8.1.0

          echo "VER=$VER" >> $GITHUB_ENV
          echo "FILEVER=$FILEVER" >> $GITHUB_ENV

      - name: Build (Release, x64, self-contained WindowsAppSDK)
        shell: powershell
        run: |
          msbuild WCtrlDcsBiosBridge.csproj `
            /p:Platform=x64 `
            /p:Configuration=${{ env.CONFIGURATION }} `
            /p:RestorePackages=false `
            /p:Version=${{ env.VER }} `
            /p:AssemblyVersion=${{ env.FILEVER }} `
            /p:FileVersion=${{ env.FILEVER }} `
            /p:InformationalVersion=v${{ env.VER }}

      - name: Create release artifacts
        shell: powershell
        run: |
          $publishDir = "bin\x64\${{ env.CONFIGURATION }}\net8.0-windows10.0.19041.0"
          New-Item -ItemType Directory -Force -Path ./publish | Out-Null
          Copy-Item "$publishDir\*" -Destination "./publish/" -Recurse

          Copy-Item "README.md" -Destination "./publish/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE.txt" -Destination "./publish/" -ErrorAction SilentlyContinue
          Copy-Item "thirdparty-licences.txt" -Destination "./publish/" -ErrorAction SilentlyContinue
          Copy-Item "docs/" -Destination "./publish/docs/" -Recurse -ErrorAction SilentlyContinue

          Compress-Archive -Path ./publish/* -DestinationPath wctrl-dcsbios-bridge-${{ github.ref_name }}.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wctrl-dcsbios-bridge-${{ github.ref_name }}
          path: ./publish/
          retention-days: 15

      - name: Upload release zip
        uses: actions/upload-artifact@v7
        with:
          name: wctrl-dcsbios-bridge-${{ github.ref_name }}-zip
          path: wctrl-dcsbios-bridge-${{ github.ref_name }}.zip
          retention-days: 15

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: wctrl-dcsbios-bridge-${{ github.ref_name }}-zip
          path: .
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: wctrl-dcsbios-bridge-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
