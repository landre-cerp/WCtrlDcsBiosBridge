name: Build on Push

on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
    branches:
      - '**' # Triggers on push to any branch

permissions:
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # WinUI 3 app needs the VS-bundled MSBuild (MrtCore PRI generation isn't available
      # to the standalone dotnet SDK).
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: |
          dotnet restore WCtrlDcsBiosBridge.csproj
          dotnet restore Tests/WCtrlDcsBiosBridge.Tests.csproj

      - name: Build
        run: |
          msbuild WCtrlDcsBiosBridge.csproj /p:Platform=x64 /p:Configuration=${{ env.CONFIGURATION }} /p:RestorePackages=false
          msbuild Tests/WCtrlDcsBiosBridge.Tests.csproj /p:Platform=x64 /p:Configuration=${{ env.CONFIGURATION }} /p:RuntimeIdentifier=win-x64 /p:RestorePackages=false

      # Runs the headless logic tests (hot-plug diff, config validation, version compare).
      # Built with VS MSBuild above (dotnet SDK MSBuild lacks MrtCore PRI tasks), then
      # executed with --no-build to avoid re-invoking the dotnet SDK toolchain.
      - name: Test
        run: dotnet test Tests/WCtrlDcsBiosBridge.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -p:Platform=x64 -p:RuntimeIdentifier=win-x64
