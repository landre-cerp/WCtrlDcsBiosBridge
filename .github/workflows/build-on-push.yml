name: Build on Push

on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
    branches:
      - '**' # Triggers on push to any branch

permissions:
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # WinUI 3 app needs the VS-bundled MSBuild (MrtCore PRI generation isn't available
      # to the standalone dotnet SDK).
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore WCtrlDcsBiosBridge.csproj

      - name: Build
        run: msbuild WCtrlDcsBiosBridge.csproj /p:Platform=x64 /p:Configuration=${{ env.CONFIGURATION }} /p:RestorePackages=false

      # Runs the headless logic tests (hot-plug diff, config validation, version compare).
      # dotnet test restores and builds the test project (which references the app) itself.
      - name: Test
        run: dotnet test Tests/WCtrlDcsBiosBridge.Tests.csproj --configuration ${{ env.CONFIGURATION }}
